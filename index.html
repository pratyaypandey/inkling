<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>inkling</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 50% 30%, #1a1a2e, #0b0b12 70%);
      color: #f5f5f7;
    }
    .wrap { text-align: center; padding: 2rem; }
    h1 { font-size: clamp(3rem, 12vw, 7rem); font-weight: 700; letter-spacing: -0.04em; }
    p { margin-top: 1rem; color: #9a9aa8; font-size: 1.1rem; }
    .dot { color: #7c5cff; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>inkling<span class="dot">.</span></h1>
    <p>Coming soon.</p>
  </div>
</body>
</html>
