<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    a { color: inherit; text-decoration: none; }
    ::selection { background: #f0c4b4; }
  </style>
</helmet>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#f4f0e7"/>
    <line x1="38" y1="40" x2="62" y2="40" stroke="#cf4520" stroke-width="2.5"/>
    <line x1="38" y1="40" x2="50" y2="60" stroke="#cf4520" stroke-width="2.5"/>
    <line x1="62" y1="40" x2="50" y2="60" stroke="#cf4520" stroke-width="2.5"/>
    <circle cx="38" cy="40" r="4.5" fill="#cf4520"/>
    <circle cx="62" cy="40" r="4.5" fill="#cf4520"/>
    <circle cx="50" cy="60" r="4.5" fill="#211f19"/>
  </svg>
</template>

<div style="min-height:100vh; background:#f4f0e7; display:flex; flex-direction:column; padding:9vh 8vw; font-family:'JetBrains Mono',monospace; color:#211f19;">

  <div style="max-width:600px; width:100%; margin:0 auto; display:flex; flex-direction:column; flex:1;">

    <!-- masthead -->
    <div>
      <pre style="margin:0 0 clamp(36px,6vh,56px); font-size:18px; line-height:1.3; color:#cf4520; white-space:pre;">&#9679;&#9472;&#9472;&#9472;&#9679;
 &#9586; &#9585;
  &#9679;</pre>

      <div style="font-size:clamp(34px,6vw,44px); letter-spacing:0.02em; color:#1a1813;">inkling</div>

      <div style="margin-top:18px; font-size:clamp(14px,2.4vw,16px); color:#7c7563;">
        <span style="color:#cf4520;">//</span>
        <span onClick="{{ toggleWe }}" onMouseEnter="{{ openWe }}" onMouseLeave="{{ closeWe }}" style="cursor:pointer;">
          <sc-if value="{{ weClosed }}" hint-placeholder-val="{{ true }}"><span style="border-bottom:1px dotted #b1a992;">we</span></sc-if>
          <sc-if value="{{ weOpen }}" hint-placeholder-val="{{ false }}"><span><a href="https://pratyaypandey.com" target="_blank" rel="noopener" style="color:#cf4520; border-bottom:1px solid #e0b3a2;">pratyay</a> &amp; <a href="#" style="color:#cf4520; border-bottom:1px solid #e0b3a2;">jai</a></span></sc-if>
        </span>
        had an inkling
      </div>
    </div>

    <!-- breathing room -->
    <div style="flex:1; min-height:22vh;"></div>

    <!-- projects -->
    <div>
      <div style="font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:#a49c88; margin-bottom:18px;">~/projects</div>

      <a href="#" style="display:block; border-top:1px solid #ddd6c5; padding:20px 0;" style-hover="background:#efe9dc;">
        <div style="display:flex; justify-content:space-between; align-items:baseline; font-size:clamp(15px,2.4vw,17px); color:#1a1813;">
          <span>slower&nbsp;roads</span>
          <span style="color:#cf4520;">&rarr;</span>
        </div>
        <div style="margin-top:8px; font-size:13px; line-height:1.6; color:#7c7563; max-width:56ch;">an on-device, real-time, steerable driving world model &mdash; a neural net dreams every frame, live, in your browser.</div>
      </a>

      <div style="border-top:1px solid #ddd6c5;"></div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { weOpen: false };
  renderVals() {
    return {
      openWe: () => this.setState({ weOpen: true }),
      closeWe: () => this.setState({ weOpen: false }),
      toggleWe: () => this.setState((s) => ({ weOpen: !s.weOpen })),
      weOpen: this.state.weOpen,
      weClosed: !this.state.weOpen,
    };
  }
}
</script>
</body>
</html>
